name: "Flunner"
run-name: "Flunner Run"

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode: web, desktop, or test."
        required: true
        default: "web"
      port:
        description: "Port for Flutter web server."
        required: false
        default: "8080"
      flutter_version:
        description: "Flutter version or channel."
        required: false
        default: "stable"
      entry_file:
        description: "Entry file for Flutter run."
        required: false
        default: "lib/main.dart"

jobs:
  flunner:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: sudo apt-get update -y || true

    - name: Download Flutter SDK
      run: |
        echo "Downloading Flutter (${{ github.event.inputs.flutter_version }})..."
        git clone https://github.com/flutter/flutter.git -b ${{ github.event.inputs.flutter_version }} --depth 1
        echo "$PWD/flutter/bin" >> $GITHUB_PATH

    - name: Flutter doctor
      run: flutter doctor -v

    - name: Get packages
      run: flutter pub get

    - name: Run Flutter (web mode)
      if: ${{ github.event.inputs.mode == 'web' }}
      env:
        PORT: ${{ github.event.inputs.port }}
      run: |
        echo "Starting Flutter web server on port $PORT..."
        nohup flutter run -d web-server --web-port=$PORT --target=${{ github.event.inputs.entry_file }} > flutter.log 2>&1 &
        echo $! > flutter.pid
        echo "Flutter web server started (PID: $(cat flutter.pid))"
        sleep 5

    - name: Run Flutter (desktop mode)
      if: ${{ github.event.inputs.mode == 'desktop' }}
      run: |
        echo "Starting Flutter desktop app..."
        nohup flutter run -d linux --target=${{ github.event.inputs.entry_file }} > flutter.log 2>&1 &
        echo $! > flutter.pid
        echo "Flutter desktop app started (PID: $(cat flutter.pid))"
        sleep 5

    - name: Run Flutter tests
      if: ${{ github.event.inputs.mode == 'test' }}
      run: flutter test --machine
